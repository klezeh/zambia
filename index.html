<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crops Farming Cashflow — Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d26;
      --surface2: #22262f;
      --border: #2a2f3a;
      --text: #e8eaf0;
      --muted: #8b91a0;
      --accent: #10b981;
      --accentDk: #065f46;
      --orange: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --radius: 12px
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.5;
      min-height: 100vh
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    button {
      cursor: pointer;
      transition: all 0.15s
    }

    button:hover {
      opacity: 0.9
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15)
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px
    }

    table {
      font-variant-numeric: tabular-nums;
      border-collapse: collapse
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 92%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideIn 0.3s
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      display: inline-block
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      transition: 0.3s
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s
    }

    .toggle-switch input:checked+.toggle-slider {
      background: var(--accent)
    }

    .toggle-switch input:checked+.toggle-slider::before {
      transform: translateX(20px)
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700
    }

    .badge-in {
      background: #065f4630;
      color: #10b981
    }

    .badge-out {
      background: #7f1d1d30;
      color: #ef4444
    }

    .action-btn {
      background: none;
      border: none;
      font-size: 14px;
      padding: 4px;
      border-radius: 6px
    }

    .action-btn:hover {
      background: var(--surface2)
    }

    .warn-box {
      background: #7f1d1d30;
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--red)
    }

    .link-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 9px;
      font-weight: 700;
      background: #065f4630;
      color: var(--accent)
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <script>

    // ═══════════════════════════════════════════════════════════════════════
    // DATA LAYER — Supabase Cloud
    // ═══════════════════════════════════════════════════════════════════════
    const SUPABASE_URL='https://emwauwwyghwxqkyxujyl.supabase.co';
    const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtd2F1d3d5Z2h3eHFreXh1anlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mzc2MTEsImV4cCI6MjA5ODIxMzYxMX0._LalYSBreLCpBkVT9S7YeUQrtjk3vko3dFh0aAxuBTk';
    const supa=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    let dbCache={cashflow:[],expenses:[]};
    function getDB(){return dbCache}
    async function loadFromCloud(){
      const{data:cf}=await supa.from('cashflow').select('*').order('id');
      const{data:exp}=await supa.from('expenses').select('*').order('id');
      dbCache.cashflow=(cf||[]).map(r=>({id:r.id,sn:r.sn,type:r.type,partner:r.partner||'',amountAED:parseFloat(r.amount_aed)||0,transferDate:r.transfer_date||'',exchangeDate:r.exchange_date||'',exchRate:parseFloat(r.exch_rate)||0,zmwEquiv:parseFloat(r.zmw_equiv)||0,notes:r.notes||''}));
      dbCache.expenses=(exp||[]).map(r=>({id:r.id,date:r.date||'',amount:parseFloat(r.amount)||0,paidTo:r.paid_to||'',purpose:r.purpose||'',category:r.category||'',linkedCfId:r.linked_cf_id||null,linkedCfIds:r.linked_cf_ids||null}));
      return dbCache;
    }
    async function addCashflow(rec){
      const{data}=await supa.from('cashflow').insert({sn:rec.sn,type:rec.type,partner:rec.partner,amount_aed:rec.amountAED,transfer_date:rec.transferDate,exchange_date:rec.exchangeDate,exch_rate:rec.exchRate,zmw_equiv:rec.zmwEquiv,notes:rec.notes}).select().single();
      return data?data.id:null;
    }
    async function updateCashflowDB(id,rec){
      await supa.from('cashflow').update({sn:rec.sn,type:rec.type,partner:rec.partner,amount_aed:rec.amountAED,transfer_date:rec.transferDate,exchange_date:rec.exchangeDate,exch_rate:rec.exchRate,zmw_equiv:rec.zmwEquiv,notes:rec.notes}).eq('id',id);
    }
    async function addExpense(rec){
      const{data}=await supa.from('expenses').insert({date:rec.date,amount:rec.amount,paid_to:rec.paidTo,purpose:rec.purpose,category:rec.category||'',linked_cf_id:rec.linkedCfId||null,linked_cf_ids:rec.linkedCfIds||null}).select().single();
      return data?data.id:null;
    }
    async function updateExpenseDB(id,rec){
      await supa.from('expenses').update({date:rec.date,amount:rec.amount,paid_to:rec.paidTo,purpose:rec.purpose,category:rec.category||'',linked_cf_id:rec.linkedCfId||null,linked_cf_ids:rec.linkedCfIds||null}).eq('id',id);
    }
    async function deleteRecord(table,id){await supa.from(table).delete().eq('id',id)}
    async function migrateToCloud(){
      const migrated=localStorage.getItem('farm_migrated_supabase');
      if(migrated)return;
      const{count}=await supa.from('cashflow').select('*',{count:'exact',head:true});
      if(count>0){localStorage.setItem('farm_migrated_supabase','1');return}
      const local=localStorage.getItem('farm_v4')||localStorage.getItem('farm_v3');
      if(!local){localStorage.setItem('farm_migrated_supabase','1');return}
      const d=JSON.parse(local);
      if(d.cashflow&&d.cashflow.length){for(const r of d.cashflow){await supa.from('cashflow').insert({sn:r.sn,type:r.type,partner:r.partner||'',amount_aed:r.amountAED||0,transfer_date:r.transferDate||'',exchange_date:r.exchangeDate||'',exch_rate:r.exchRate||0,zmw_equiv:r.zmwEquiv||0,notes:r.notes||''})}}
      if(d.expenses&&d.expenses.length){for(const r of d.expenses){await supa.from('expenses').insert({date:r.date||'',amount:r.amount||0,paid_to:r.paidTo||'',purpose:r.purpose||'',category:r.category||'',linked_cf_id:r.linkedCfId||null,linked_cf_ids:r.linkedCfIds||null})}}
      localStorage.setItem('farm_migrated_supabase','1');
      toast('✓ Data migrated to cloud!');
    }
    function nextId(a){return a.length?Math.max(...a.map(r=>r.id))+1:1}
    function getLinkedTotal(db,cfId){
      const allocations={};
      db.expenses.forEach(e=>{
        const cfIds=e.linkedCfIds&&e.linkedCfIds.length?e.linkedCfIds:(e.linkedCfId?[e.linkedCfId]:[]);
        if(!cfIds.length)return;
        if(cfIds.length===1){allocations[cfIds[0]]=(allocations[cfIds[0]]||0)+e.amount}else{
          let remExp=e.amount;
          cfIds.forEach((id,idx)=>{if(remExp<=0)return;const cf=db.cashflow.find(c=>c.id===id);if(!cf)return;const currentlyUsed=allocations[id]||0;const available=(cf.zmwEquiv||0)-currentlyUsed;if(idx===cfIds.length-1){allocations[id]=currentlyUsed+remExp}else{const toTake=Math.max(available,0);const applied=Math.min(toTake,remExp);allocations[id]=currentlyUsed+applied;remExp-=applied}});
        }
      });
      return allocations[cfId]||0;
    }
    function getRemaining(db,cfId){const cf=db.cashflow.find(c=>c.id===cfId);if(!cf||cf.type!=='out')return 0;return(cf.zmwEquiv||0)-getLinkedTotal(db,cfId)}

    // ═══════════════════════════════════════════════════════════════════════
    // ANALYTICS
    // ═══════════════════════════════════════════════════════════════════════
    function analytics(db, filters = {}) {
      let cf = db.cashflow, exp = db.expenses;
      if (filters.from) { cf = cf.filter(r => (r.exchangeDate || r.transferDate) >= filters.from); exp = exp.filter(r => r.date >= filters.from) }
      if (filters.to) { cf = cf.filter(r => (r.exchangeDate || r.transferDate) <= filters.to); exp = exp.filter(r => r.date <= filters.to) }
      if (filters.person) { exp = exp.filter(r => r.paidTo === filters.person) }
      if (filters.type && filters.type !== 'all') { cf = cf.filter(r => r.type === filters.type) }

      const totalIn = cf.filter(r => r.type === 'in').reduce((s, r) => s + (r.amountAED || 0), 0);
      const totalOut = cf.filter(r => r.type === 'out').reduce((s, r) => s + (r.amountAED || 0), 0);
      const balance = totalIn - totalOut;
      const totalZMW = cf.filter(r => r.type === 'out').reduce((s, r) => s + (r.zmwEquiv || 0), 0);
      const totalExp = exp.reduce((s, r) => s + (r.amount || 0), 0);
      const byPerson = {}; exp.forEach(r => { byPerson[r.paidTo] = (byPerson[r.paidTo] || 0) + r.amount });
      const sorted = [...exp].sort((a, b) => new Date(a.date) - new Date(b.date));
      const dateMap = {}; let cum = 0; sorted.forEach(r => { cum += r.amount; dateMap[r.date] = cum });
      const rates = cf.filter(r => r.exchRate > 0).map(r => r.exchRate);
      const avgRate = rates.length ? rates.reduce((s, r) => s + r, 0) / rates.length : 0;
      const cats = { 'Land Lease': 0, 'Legal/Lawyer': 0, 'Labor': 0, 'Equipment/Machinery': 0, 'Seeds': 0, 'Fertilizers/Manure': 0, 'Tools': 0, 'Shelter': 0, 'Survey/Measurement': 0, 'Transportation': 0, 'Talk Time': 0, 'Other': 0 };
      exp.forEach(r => { const cat=r.category||''; if(cat&&cats.hasOwnProperty(cat)){cats[cat]+=r.amount}else if(cat){cats[cat]=(cats[cat]||0)+r.amount}else{const n=(r.purpose||'').toLowerCase();if(n.includes('land')||n.includes('lease')||n.includes('tapi'))cats['Land Lease']+=r.amount;else if(n.includes('lawyer')||n.includes('retainer')||n.includes('agreement')||n.includes('legal'))cats['Legal/Lawyer']+=r.amount;else if(n.includes('equip')||n.includes('machine')||n.includes('tractor')||n.includes('bulldozer'))cats['Equipment/Machinery']+=r.amount;else if(n.includes('seed')||n.includes('plant'))cats['Seeds']+=r.amount;else if(n.includes('fertil')||n.includes('manure')||n.includes('compost'))cats['Fertilizers/Manure']+=r.amount;else if(n.includes('tool')||n.includes('hoe')||n.includes('spade')||n.includes('cutlass'))cats['Tools']+=r.amount;else if(n.includes('shelter')||n.includes('shed')||n.includes('store')||n.includes('build'))cats['Shelter']+=r.amount;else if(n.includes('labour')||n.includes('labor')||n.includes('clearing')||n.includes('mobilize')||n.includes('worker')||n.includes('steve'))cats['Labor']+=r.amount;else if(n.includes('measuring')||n.includes('survey')||n.includes('measure'))cats['Survey/Measurement']+=r.amount;else if(n.includes('transport')||n.includes('fuel')||n.includes('travel')||n.includes('bus')||n.includes('taxi'))cats['Transportation']+=r.amount;else if(n.includes('airtime')||n.includes('talk')||n.includes('call')||n.includes('phone')||n.includes('recharge'))cats['Talk Time']+=r.amount;else cats['Other']+=r.amount} });

      // Linkage analytics
      const linkedExp = exp.filter(e => e.linkedCfId || (e.linkedCfIds && e.linkedCfIds.length));
      const unlinkedExp = exp.filter(e => !e.linkedCfId && !(e.linkedCfIds && e.linkedCfIds.length));
      const outRecords = cf.filter(r => r.type === 'out');
      const overBudget = outRecords.filter(r => { const used = getLinkedTotal(db, r.id); return used > (r.zmwEquiv || 0) && (r.zmwEquiv || 0) > 0 });

      const inCount = cf.filter(r => r.type === 'in').length;
      const outCount = cf.filter(r => r.type === 'out').length;
      return { totalIn, totalOut, balance, totalZMW, totalExp, byPerson, dateMap, avgRate, cats, txCount: cf.length, inCount, outCount, expCount: exp.length, filteredCF: cf, filteredExp: exp, linkedExp, unlinkedExp, overBudget };
    }

    // ═══════════════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════════════
    let tab = 'dashboard', db = getDB(), filters = { from: '', to: '', person: '', type: 'all' }, budgetExpanded = false;
    function fmt(n) { return (n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) }
    function fmtI(n) { return (n || 0).toLocaleString('en-US', { maximumFractionDigits: 0 }) }
    function render() { db = getDB(); document.getElementById('app').innerHTML = nav() + content(); document.getElementById('modal-root').innerHTML = '' }
    function go(t) { tab = t; render() }
    const inputS = 'width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;';
    function fld(l, inp) { return `<div><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:5px;">${l}</div>${inp}</div>` }

    // ═══════════════════════════════════════════════════════════════════════
    // NAV
    // ═══════════════════════════════════════════════════════════════════════
    function nav() {
      const ts = [{ id: 'dashboard', l: 'Dashboard', i: '📊' }, { id: 'cashflow', l: 'Cash Flow', i: '💰' }, { id: 'expenses', l: 'Expenses', i: '📋' }, { id: 'add', l: 'Add Record', i: '➕' }, { id: 'reports', l: 'Reports', i: '📄' }];
      return `<nav style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 0;">
      <div style="width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#059669);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;">🌾</div>
      <div><div style="font-size:14px;font-weight:700;">Crops Farming</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;">Cashflow Manager</div></div>
      <div style="margin-left:10px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:10px;font-weight:700;color:var(--accent);">🔗 ${db.expenses.filter(e => e.linkedCfId || (e.linkedCfIds && e.linkedCfIds.length)).length}/${db.expenses.length} linked</div>
    </div>
    <div style="display:flex;gap:3px;">${ts.map(t => `<button onclick="go('${t.id}')" style="background:${tab === t.id ? 'var(--accent)' : 'transparent'};color:${tab === t.id ? '#fff' : 'var(--muted)'};border:none;padding:7px 14px;border-radius:8px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;"><span>${t.i}</span>${t.l}</button>`).join('')}</div>
  </nav>`}

    function content() {
      switch (tab) {
        case 'dashboard': return dashboard();
        case 'cashflow': return cashflowView();
        case 'expenses': return expensesView();
        case 'add': return addView();
        case 'reports': return reportsView();
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // DASHBOARD — with linkage analytics & Partner Share
    // ═══════════════════════════════════════════════════════════════════════
    function dashboard() {
      const a = analytics(db);
      const util = a.totalIn > 0 ? ((a.totalOut / a.totalIn) * 100).toFixed(1) : 0;
      const cC = { 'Land Lease': '#10b981', 'Legal/Lawyer': '#3b82f6', 'Labor': '#f59e0b', 'Equipment/Machinery': '#ef4444', 'Seeds': '#22c55e', 'Fertilizers/Manure': '#a855f7', 'Tools': '#f97316', 'Shelter': '#06b6d4', 'Survey/Measurement': '#8b5cf6', 'Transportation': '#0ea5e9', 'Talk Time': '#ec4899', 'Other': '#6b7280' };
      const extraColors=['#14b8a6','#eab308','#84cc16','#f43f5e','#a3e635'];
      const ce = Object.entries(a.cats).filter(([, v]) => v > 0).sort((a,b)=>b[1]-a[1]);
      ce.forEach(([c],i)=>{if(!cC[c])cC[c]=extraColors[i%extraColors.length]});
      const ct = ce.reduce((s, [, v]) => s + v, 0) || 1;
      let ca = 0; const segs = ce.map(([c, v]) => { const s = ca; ca += (v / ct) * 360; return { c, v, s, e: ca, col: cC[c] } });
      function pt(cx, cy, r, ang) { const d = (ang - 90) * Math.PI / 180; return { x: cx + r * Math.cos(d), y: cy + r * Math.sin(d) } }
      function ap(cx, cy, r, sa, ea) { const s = pt(cx, cy, r, ea), e = pt(cx, cy, r, sa); return `M ${s.x} ${s.y} A ${r} ${r} 0 ${ea - sa > 180 ? 1 : 0} 0 ${e.x} ${e.y}` }
      const donut = `<svg viewBox="0 0 200 200" style="width:160px;height:160px;">${segs.map(s => `<path d="${ap(100, 100, 75, s.s, s.e - 0.5)}" fill="none" stroke="${s.col}" stroke-width="22" stroke-linecap="round"/>`).join('')}<text x="100" y="92" text-anchor="middle" fill="#e8eaf0" font-size="16" font-weight="800">${fmtI(ct)}</text><text x="100" y="108" text-anchor="middle" fill="#8b91a0" font-size="9">ZMW</text></svg>`;

      const pe = Object.entries(a.byPerson).sort((a, b) => b[1] - a[1]);
      const mp = pe.length ? pe[0][1] : 1;
      const pc = ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#ef4444'];

      // Calculate Partner Shares
      const partnerTotals = {};
      db.cashflow.filter(r => r.type === 'in').forEach(r => {
        const p = r.partner || 'Unknown';
        partnerTotals[p] = (partnerTotals[p] || 0) + (r.amountAED || 0);
      });
      const partnerShares = Object.entries(partnerTotals).map(([p, amt]) => {
        return { partner: p, amount: amt, pct: a.totalIn > 0 ? ((amt / a.totalIn) * 100).toFixed(1) : 0 };
      }).sort((x, y) => y.amount - x.amount);
      const mpShare = partnerShares.length ? partnerShares[0].amount : 1;

      // Budget utilization per cashflow-out
      const outRecs = db.cashflow.filter(r => r.type === 'out' && r.zmwEquiv > 0);
      const budgetRows = outRecs.map(r => {
        const used = getLinkedTotal(db, r.id);
        const pct = r.zmwEquiv > 0 ? ((used / r.zmwEquiv) * 100).toFixed(0) : 0;
        return { id: r.id, sn: r.sn, notes: r.notes, budget: r.zmwEquiv, used, remaining: r.zmwEquiv - used, pct };
      });

      return `<div style="padding:24px;max-width:1200px;margin:0 auto;">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:12px;margin-bottom:22px;">
      ${kpi('Total Funded', `AED ${fmt(a.totalIn)}`, '💵', '--accent', a.inCount + ' CF-IN')}
      ${kpi('Total Spent', `AED ${fmt(a.totalOut)}`, '📤', '--orange', a.outCount + ' CF-OUT')}
      ${kpi('Balance', `AED ${fmt(a.balance)}`, '🏦', a.balance >= 1000 ? '--accent' : (a.balance >= 0 ? '--orange' : '--red'), a.balance >= 1000 ? 'Healthy' : (a.balance >= 0 ? '⚠ Low' : '⚠ Over'))}
      ${kpi('ZMW Expenses', `K ${fmt(a.totalExp)}`, '💸', '--blue', a.expCount + ' payments')}
      ${kpi('Avg Rate', a.avgRate.toFixed(2), '💱', '--purple', 'AED→ZMW')}
    </div>
    
    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));gap:14px;margin-bottom:22px;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;">
        <div style="font-size:12px;font-weight:700;margin-bottom:14px;">Spend by Category</div>

      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;">

        ${pe.length>6?`<div style="font-size:9px;color:var(--muted);text-align:center;padding-top:4px;">+${pe.length-6} more</div>`:''}

      </div>
    </div>

    ${(() => {
          const de = Object.entries(a.dateMap);
          const mc = de.length ? de[de.length - 1][1] : 1;
          const lp = de.map(([, v], i) => `${20 + ((i / (de.length - 1 || 1)) * 360)},${130 - (v / mc) * 100}`).join(' ');
          return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:22px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;"><div style="font-size:12px;font-weight:700;">Cumulative Expenses</div><div style="font-size:11px;font-weight:700;color:var(--accent);">K ${fmtI(mc)}</div></div>
        <svg viewBox="0 0 400 150" style="width:100%;height:140px;"><defs><linearGradient id="aG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/><stop offset="100%" stop-color="#10b981" stop-opacity="0.02"/></linearGradient></defs><line x1="20" y1="130" x2="380" y2="130" stroke="var(--border)"/>${de.length > 1 ? `<polygon points="${lp} 380,130 20,130" fill="url(#aG)"/><polyline points="${lp}" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>${de.map(([, v], i) => { const x = 20 + (i / (de.length - 1 || 1)) * 360, y = 130 - (v / mc) * 100; return `<circle cx="${x}" cy="${y}" r="3.5" fill="#10b981" stroke="var(--surface)" stroke-width="2"/>`; }).join('')}` : ''}</svg>
      </div>`;
        })()}

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:22px;">
      <div onclick="budgetExpanded=!budgetExpanded;render()" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--blue));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;">🔗</div>
          <div><div style="font-size:13px;font-weight:800;">Budget Utilization</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;">Cashflow-OUT → Expenses</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="text-align:right;">
            <div style="font-size:14px;font-weight:800;color:${(() => { const avg = budgetRows.length ? Math.round(budgetRows.reduce((s, r) => s + parseFloat(r.pct), 0) / budgetRows.length) : 0; return avg > 100 ? 'var(--red)' : avg > 80 ? 'var(--orange)' : 'var(--accent)'; })()};">${budgetRows.length ? Math.round(budgetRows.reduce((s, r) => s + parseFloat(r.pct), 0) / budgetRows.length) : 0}% avg</div>
            <div style="font-size:9px;color:var(--muted);">${budgetRows.length} records · K ${fmtI(budgetRows.reduce((s, r) => s + r.used, 0))} / K ${fmtI(budgetRows.reduce((s, r) => s + r.budget, 0))}</div>
          </div>
          <div style="font-size:16px;color:var(--muted);transition:transform 0.3s;transform:rotate(${budgetExpanded ? '180' : '0'}deg);">▼</div>
        </div>
      </div>
      ${!budgetExpanded ? `
        <div style="margin-top:14px;">
          <div style="position:relative;background:var(--bg);border-radius:6px;height:10px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);">
            <div style="background:linear-gradient(90deg,var(--accent),var(--blue));height:100%;width:${budgetRows.length ? Math.min(100, Math.round(budgetRows.reduce((s, r) => s + parseFloat(r.pct), 0) / budgetRows.length)) : 0}%;border-radius:6px;transition:width 0.5s ease;box-shadow:0 0 8px rgba(16,185,129,0.3);"></div>

            <span style="font-size:9px;color:var(--muted);">Click to expand individual records</span>
            <span style="font-size:9px;color:var(--muted);">${budgetRows.filter(r => r.pct >= 100).length}/${budgetRows.length} fully utilized</span>
          </div>
        </div>
      `: `
        <div style="margin-top:16px;display:grid;gap:12px;">
        ${budgetRows.map(r => {
          const color = r.used > r.budget ? '#ef4444' : r.pct >= 100 ? '#10b981' : r.pct > 80 ? '#f59e0b' : '#3b82f6';
          const gradient = r.used > r.budget ? 'linear-gradient(90deg,#ef4444,#f87171)' : r.pct >= 100 ? 'linear-gradient(90deg,#059669,#10b981)' : r.pct > 80 ? 'linear-gradient(90deg,#d97706,#f59e0b)' : 'linear-gradient(90deg,#2563eb,#3b82f6)';
          const barW = Math.min(100, (r.used / r.budget * 100)).toFixed(1);
          const statusIcon = r.used > r.budget ? '🔴' : r.pct >= 100 ? '✅' : r.pct > 80 ? '🟡' : '🔵';
          return `<div style="background:var(--surface2);border-radius:10px;padding:14px 16px;border:1px solid var(--border);transition:all 0.2s;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:12px;">${statusIcon}</span>
              <div>
                <div style="font-size:11px;font-weight:700;color:var(--text);">#${r.sn} ${(r.notes || '').slice(0, 35)}</div>
                <div style="font-size:9px;color:var(--muted);margin-top:1px;">Budget: K ${fmtI(r.budget)}</div>
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:12px;font-weight:800;color:${color};">${r.pct}%</div>
              <div style="font-size:9px;color:var(--muted);">K ${fmtI(r.used)} used</div>
            </div>
          </div>
          <div style="position:relative;background:var(--bg);border-radius:6px;height:10px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);">
            <div style="background:${gradient};height:100%;width:${barW}%;border-radius:6px;transition:width 0.5s ease;box-shadow:0 0 8px ${color}40;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:5px;">
            <span style="font-size:9px;color:var(--muted);">${r.used > r.budget ? `⚠ Over by K ${fmtI(r.used - r.budget)}` : `K ${fmtI(r.remaining)} remaining`}</span>
            <span style="font-size:9px;color:var(--muted);">K ${fmtI(r.used)} / K ${fmtI(r.budget)}</span>
          </div>
        </div>`}).join('')}
        </div>
      `}
    </div>

    ${a.overBudget.length ? `<div style="background:linear-gradient(135deg,#7f1d1d20,#7f1d1d10);border:1px solid #ef444440;border-radius:var(--radius);padding:14px 18px;margin-bottom:22px;display:flex;align-items:center;gap:10px;"><span style="font-size:18px;">⚠️</span><div><div style="font-size:11px;font-weight:700;color:var(--red);">${a.overBudget.length} record(s) over budget</div><div style="font-size:10px;color:var(--muted);">Consider redistributing expenses to other cashflow-out records.</div></div></div>` : ''}
${a.unlinkedExp.length ? `<div style="background:linear-gradient(135deg,#f59e0b20,#f59e0b10);border:1px solid #f59e0b40;border-radius:var(--radius);padding:14px 18px;margin-bottom:22px;display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="go('expenses')"><span style="font-size:18px;">🔗</span><div><div style="font-size:11px;font-weight:700;color:var(--orange);">${a.unlinkedExp.length} unlinked expense(s) found</div><div style="font-size:10px;color:var(--muted);">Click here to view your expenses and assign them to a cashflow budget.</div></div></div>` : ''}
  </div>`}

    function kpi(l, v, i, c, s) { return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;"><div style="position:absolute;top:-8px;right:-8px;font-size:40px;opacity:0.05;">${i}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;font-weight:600;">${l}</div><div style="font-size:18px;font-weight:800;color:var(${c});margin:5px 0 3px;">${v}</div><div style="font-size:10px;color:var(--muted);">${s}</div></div>` }

    // ═══════════════════════════════════════════════════════════════════════
    // CASHFLOW TABLE
    // ═══════════════════════════════════════════════════════════════════════
    function cashflowView() {
      const rows = db.cashflow;
      const inRows = rows.filter(r => r.type === 'in');
      const outRows = rows.filter(r => r.type === 'out');
      const thS = 'padding:10px 12px;text-align:left;color:var(--muted);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--border);';
      return `<div style="padding:24px;max-width:1200px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div><div style="font-size:16px;font-weight:800;">Cash Flow Records</div><div style="font-size:11px;color:var(--muted);">${rows.length} transactions (${inRows.length} IN, ${outRows.length} OUT)</div></div>
      <button onclick="go('add');setTimeout(()=>togForm('cf'),50)" style="background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:11px;font-weight:700;">+ Add Transaction</button>
    </div>
    ${inRows.length ? `<div style="margin-bottom:20px;">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px;"><span class="badge badge-in">↓ IN</span> Funding Received (AED ${fmt(inRows.reduce((s, r) => s + r.amountAED, 0))})</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
        <table style="width:100%;font-size:11px;">
          <thead><tr style="background:var(--surface2);">
            <th style="${thS}">SN</th><th style="${thS}">Partner</th><th style="${thS}text-align:right;">Amount (AED)</th><th style="${thS}text-align:center;">Transfer Date</th><th style="${thS}">Notes</th><th style="${thS}text-align:center;">Actions</th>
          </tr></thead>
          <tbody>${inRows.map((r, i) => `<tr style="border-bottom:1px solid var(--border);${i % 2 ? 'background:var(--surface2);' : ''}">
            <td style="padding:9px 12px;color:var(--muted);">${r.sn || r.id}</td>
            <td style="padding:9px 12px;font-weight:600;">${r.partner || '—'}</td>
            <td style="padding:9px 12px;text-align:right;font-weight:700;color:var(--accent);">${fmt(r.amountAED)}</td>
            <td style="padding:9px 12px;text-align:center;color:var(--muted);font-size:10px;">${r.transferDate || '—'}</td>
            <td style="padding:9px 12px;color:var(--muted);font-size:10px;">${r.notes || '—'}</td>
            <td style="padding:9px 12px;text-align:center;white-space:nowrap;">
              <button class="action-btn" onclick="editCF(${r.id})" title="Edit">✏️</button>
              <button class="action-btn" onclick="delRec('cashflow',${r.id})" title="Delete">🗑️</button>
            </td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`: ''}

    ${outRows.length ? `<div>
      <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:6px;"><span class="badge badge-out">↑ OUT</span> Expenditures (AED ${fmt(outRows.reduce((s, r) => s + r.amountAED, 0))})</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
        <div style="overflow-x:auto;">
        <table style="width:100%;font-size:11px;">
          <thead><tr style="background:var(--surface2);">
            <th style="${thS}">SN</th><th style="${thS}text-align:right;">AED</th><th style="${thS}text-align:center;">Exch Date</th><th style="${thS}text-align:center;">Rate</th><th style="${thS}text-align:right;">ZMW</th><th style="${thS}text-align:right;">Used</th><th style="${thS}">Notes</th><th style="${thS}text-align:center;">Actions</th>
          </tr></thead>
          <tbody>${outRows.map((r, i) => {
        const used = getLinkedTotal(db, r.id);
        const over = used > (r.zmwEquiv || 0) && (r.zmwEquiv || 0) > 0;
        return `<tr style="border-bottom:1px solid var(--border);${i % 2 ? 'background:var(--surface2);' : ''}">
            <td style="padding:9px 12px;color:var(--muted);">${r.sn || r.id}</td>
            <td style="padding:9px 12px;text-align:right;font-weight:700;">${fmt(r.amountAED)}</td>
            <td style="padding:9px 12px;text-align:center;color:var(--muted);font-size:10px;">${r.exchangeDate || '—'}</td>
            <td style="padding:9px 12px;text-align:center;color:var(--purple);font-weight:600;">${r.exchRate || '—'}</td>
            <td style="padding:9px 12px;text-align:right;font-weight:700;color:var(--orange);">${r.zmwEquiv ? fmtI(r.zmwEquiv) : '—'}</td>
            <td style="padding:9px 12px;text-align:right;font-weight:700;color:${over ? 'var(--red)' : 'var(--accent)'};">${fmtI(used)}${over ? ' ⚠' : ''}</td>
            <td style="padding:9px 12px;color:var(--muted);font-size:10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.notes || '—'}</td>
            <td style="padding:9px 12px;text-align:center;white-space:nowrap;">
              <button class="action-btn" onclick="editCF(${r.id})" title="Edit">✏️</button>
              <button class="action-btn" onclick="delRec('cashflow',${r.id})" title="Delete">🗑️</button>
            </td>
          </tr>`}).join('')}</tbody>

    </div>`: ''}
  </div>`}

    // ═══════════════════════════════════════════════════════════════════════
    // EXPENSES TABLE — shows linked cashflow-out
    // ═══════════════════════════════════════════════════════════════════════
    function expensesView() {
      const rows = db.expenses;
      const total = rows.reduce((s, r) => s + r.amount, 0);
      const persons = [...new Set(rows.map(r => r.paidTo))];
      const thS = 'padding:10px 14px;text-align:left;color:var(--muted);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--border);';
      const pCol = { Arthur: '#3b82f6', Tapison: '#10b981', Saidou: '#f59e0b', Steve: '#8b5cf6' };
      return `<div style="padding:24px;max-width:1200px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div><div style="font-size:16px;font-weight:800;">Expense Records</div><div style="font-size:11px;color:var(--muted);">${rows.length} disbursements · Total: <strong style="color:var(--accent);">K ${fmtI(total)}</strong></div></div>
      <button onclick="tab='add';render();setTimeout(()=>togForm('exp'),50)" style="background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:11px;font-weight:700;">+ Add Expense</button>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
      <table style="width:100%;font-size:11px;">
        <thead><tr style="background:var(--surface2);">
          <th style="${thS}">#</th><th style="${thS}">Date</th><th style="${thS}text-align:right;">Amount (ZMW)</th><th style="${thS}">Paid To</th><th style="${thS}">Purpose</th><th style="${thS}">Linked CF</th><th style="${thS}text-align:center;">Actions</th>
        </tr></thead>
        <tbody>${rows.map((r, i) => {
        const cfIds = r.linkedCfIds || (r.linkedCfId ? [r.linkedCfId] : []);
        const cfs = cfIds.map(id => db.cashflow.find(x => x.id === id)).filter(Boolean);
        const linkLabels = cfs.map(c => `#${c.sn} (K ${fmtI(c.zmwEquiv)})`).join(', ');

        let linkDisplay = '';
        if (cfIds.length === 0) {
          linkDisplay = '<span class="badge" style="background:#ef444420;color:var(--red);border:1px solid #ef444450;">⚠️ Unlinked</span>';
        } else {
          const totalCap = cfs.reduce((sum, c) => sum + (c.zmwEquiv || 0), 0);
          if (r.amount > totalCap) {
            linkDisplay = `<span class="link-badge" style="background:#f59e0b20;color:var(--orange);border:1px solid #f59e0b50;">⚠️ Partial: ${linkLabels}</span>`;
          } else {
            linkDisplay = `<span class="link-badge">🔗 ${linkLabels}</span>`;
          }
        }

        return `<tr style="border-bottom:1px solid var(--border);${i % 2 ? 'background:var(--surface2);' : ''}">
          <td style="padding:9px 14px;color:var(--muted);">${i + 1}</td>
          <td style="padding:9px 14px;">${r.date}</td>
          <td style="padding:9px 14px;text-align:right;font-weight:800;color:var(--accent);font-size:12px;">K ${fmtI(r.amount)}</td>
          <td style="padding:9px 14px;"><div style="display:flex;align-items:center;gap:7px;"><div style="width:26px;height:26px;background:${pCol[r.paidTo] || '#6b7280'};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;">${(r.paidTo || '?')[0]}</div><span style="font-weight:600;">${r.paidTo}</span></div></td>
          <td style="padding:9px 14px;color:var(--muted);font-size:10px;">${r.purpose}</td>
          <td style="padding:9px 14px;">${linkDisplay}</td>
          <td style="padding:9px 14px;text-align:center;white-space:nowrap;">
            <button class="action-btn" onclick="editExp(${r.id})" title="Edit">✏️</button>
            <button class="action-btn" onclick="delRec('expenses',${r.id})" title="Delete">🗑️</button>
          </td>
        </tr>`}).join('')}
        <tr style="background:var(--bg);"><td colspan="2" style="padding:11px 14px;font-weight:800;">TOTAL</td><td style="padding:11px 14px;text-align:right;font-weight:900;color:var(--orange);font-size:13px;">K ${fmtI(total)}</td><td colspan="4" style="padding:11px 14px;color:var(--muted);font-size:10px;">${rows.length} payments · ${persons.length} recipients</td></tr>
        </tbody>
      </table>
    </div>
  </div>`}

    // ═══════════════════════════════════════════════════════════════════════
    // ADD RECORD FORM — with linking
    // ═══════════════════════════════════════════════════════════════════════
    function getCfOutOptions(excludeId) {
      return db.cashflow.filter(r => r.type === 'out').map(r => {
        const rem = getRemaining(db, r.id);
        return { id: r.id, sn: r.sn, notes: r.notes, zmw: r.zmwEquiv, remaining: rem, date: r.exchangeDate };
      }).filter(r => r.remaining > 0);
    }

    function addView() {
      const cfOuts = getCfOutOptions();
      return `<div style="padding:24px;max-width:680px;margin:0 auto;">
    <div style="font-size:16px;font-weight:800;margin-bottom:6px;">Add New Record</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:20px;">Choose record type. Expenses can be linked to cashflow-out records for budget tracking.</div>

      const isIn = document.getElementById('cf-type').value === 'in';

    // Check if expense amount exceeds linked cashflow-out budget
    function checkExpBudget() {
      const warn = document.getElementById('exp-budget-warn');
      const link2Wrap = document.getElementById('exp-link2-wrap');
      const linkId = parseInt(document.getElementById('exp-link').value);
      const link2El = document.getElementById('exp-link2');
      const link2Id = link2El ? parseInt(link2El.value) : 0;
      const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
      if (!linkId || !amount) { warn.style.display = 'none'; link2Wrap.style.display = 'none'; return }
      const remaining = getRemaining(db, linkId);

      if (amount > remaining) {
        // Show co-link option
        link2Wrap.style.display = 'block';
        // Filter out the already-selected CF-OUT from second dropdown
        const opts = getCfOutOptions().filter(r => r.id !== linkId);
        link2El.innerHTML = '<option value="">— Select additional CF-OUT —</option>' + opts.map(r => `<option value="${r.id}" ${link2Id === r.id ? 'selected' : ''}>#${r.sn} - ${(r.notes || '').slice(0, 30)} | Remaining: K ${fmtI(r.remaining)}</option>`).join('');

        const shortage = amount - remaining;
        let msg = `<div class="warn-box">⚠️ This CF-OUT only covers <strong>K ${fmtI(remaining)}</strong> of K ${fmtI(amount)}. Shortage: <strong>K ${fmtI(shortage)}</strong>.`;
        if (link2Id) {
          const rem2 = getRemaining(db, link2Id);
          const totalCovered = remaining + rem2;
          if (totalCovered >= amount) {
            msg = `<div style="margin-top:10px;padding:8px 12px;background:#065f4630;border:1px solid var(--accent);border-radius:8px;font-size:10px;color:var(--accent);">✓ Co-linked! CF-OUT #1 covers K ${fmtI(remaining)}, CF-OUT #2 covers K ${fmtI(amount - remaining)}. Total: K ${fmtI(amount)}</div>`;
          } else {
            msg += ` 2nd CF-OUT only adds K ${fmtI(rem2)}. Still short K ${fmtI(amount - totalCovered)}.`;
          }
        } else {
          msg += ` Select a 2nd CF-OUT below to co-link.`;
        }
        if (msg.includes('warn-box')) msg += '</div>';
        warn.innerHTML = msg;
        warn.style.display = 'block';
      } else {
        link2Wrap.style.display = 'none';
        warn.innerHTML = `<div style="margin-top:10px;padding:8px 12px;background:#065f4630;border:1px solid var(--accent);border-radius:8px;font-size:10px;color:var(--accent);">✓ Within budget. K ${fmtI(remaining - amount)} will remain after this expense.</div>`;
        warn.style.display = 'block';
      }
    }

    async function saveCFIn() {
      const rec = {
        sn: dbCache.cashflow.length + 1, type: 'in',
        partner: document.getElementById('cf-partner').value,
        amountAED: parseFloat(document.getElementById('cf-amount-in').value) || 0,
        transferDate: document.getElementById('cf-tdate').value,
        exchangeDate: '', exchRate: 0, zmwEquiv: 0,
        notes: document.getElementById('cf-notes-in').value
      };
      await addCashflow(rec);
      await loadFromCloud(); toast('✓ Funding record saved'); tab = 'cashflow'; render();
    }

    async function saveCFOut() {
      const db = getDB();
      const a = analytics(db);
      const amountAED = parseFloat(document.getElementById('cf-amount-out').value) || 0;
      if (amountAED > a.balance) { alert(`Transaction Blocked: This expense (AED ${fmt(amountAED)}) exceeds your available balance of AED ${fmt(a.balance)}.`); return; }
      const rate = parseFloat(document.getElementById('cf-rate').value) || 0;
      let zmw = parseFloat(document.getElementById('cf-zmw').value) || 0;
      if (rate > 0 && zmw === 0 && amountAED > 0) zmw = parseFloat((amountAED * rate).toFixed(2));
      const notes = document.getElementById('cf-notes-out').value;
      const paidTo = document.getElementById('cf-paidto').value;
      const eDate = document.getElementById('cf-edate').value;
      const cfId = await addCashflow({sn:db.cashflow.length+1,type:'out',partner:'',amountAED,transferDate:'',exchangeDate:eDate,exchRate:rate,zmwEquiv:zmw,notes});
      if (document.getElementById('cf-also-exp').checked) {
        const catSel=document.getElementById('cf-cat').value;
        const category=catSel==='__custom'?document.getElementById('cf-cat-custom').value:catSel;
        await addExpense({date:eDate||new Date().toISOString().slice(0,10),amount:zmw,paidTo:paidTo||'Unspecified',purpose:notes,linkedCfId:cfId,linkedCfIds:null,category:category||''});
      }
      await loadFromCloud(); toast('✓ Expense record saved & linked'); tab = 'cashflow'; render();
    }

    async function saveExp() {
      const linkVal = document.getElementById('exp-link').value;
      const link2El = document.getElementById('exp-link2');
      const link2Val = link2El ? link2El.value : '';
      const linkedCfId = linkVal ? parseInt(linkVal) : null;
      const linkedCfId2 = (link2Val && document.getElementById('exp-link2-wrap').style.display !== 'none') ? parseInt(link2Val) : null;
      const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
      let linkedCfIds = [];
      if (linkedCfId) linkedCfIds.push(linkedCfId);
      if (linkedCfId2 && linkedCfId2 !== linkedCfId) linkedCfIds.push(linkedCfId2);
      const catSel=document.getElementById('exp-cat').value;
      const category=catSel==='__custom'?document.getElementById('exp-cat-custom').value:catSel;
      await addExpense({date:document.getElementById('exp-date').value,amount,paidTo:document.getElementById('exp-to').value,purpose:document.getElementById('exp-purpose').value,category:category||'',linkedCfId,linkedCfIds:linkedCfIds.length?linkedCfIds:null});
      await loadFromCloud(); toast('✓ Expense saved'+(linkedCfIds.length?' & linked':'')); tab='expenses'; render();
    }

    async function delRec(table, id) {
      if (!confirm('Delete this record?')) return;
      await deleteRecord(table, id);
      await loadFromCloud();
      toast('Deleted');
      render();
    }

    // Validates budget capacity during edits
    function checkEditExpBudget() {
      const warn = document.getElementById('ee-budget-warn');
      const link2Wrap = document.getElementById('ee-link2-wrap');
      const linkId = parseInt(document.getElementById('ee-link').value);
      const link2El = document.getElementById('ee-link2');
      const link2Id = link2El ? parseInt(link2El.value) : 0;
      const amount = parseFloat(document.getElementById('ee-amount').value) || 0;

      if (!linkId || !amount) { warn.style.display = 'none'; link2Wrap.style.display = 'none'; return; }

      const cf1 = db.cashflow.find(c => c.id === linkId);
      let cf1Cap = cf1 ? cf1.zmwEquiv : 0;

      if (amount > cf1Cap) {
        link2Wrap.style.display = 'block';
        const shortage = amount - cf1Cap;
        let msg = `<div class="warn-box">⚠️ CF-OUT #1 max capacity is <strong>K ${fmtI(cf1Cap)}</strong>. Shortage: <strong>K ${fmtI(shortage)}</strong>.`;

        if (link2Id) {
          const cf2 = db.cashflow.find(c => c.id === link2Id);
          const cf2Cap = cf2 ? cf2.zmwEquiv : 0;
          const totalCap = cf1Cap + cf2Cap;
          if (totalCap >= amount) {
            msg = `<div style="margin-top:10px;padding:8px 12px;background:#065f4630;border:1px solid var(--accent);border-radius:8px;font-size:10px;color:var(--accent);">✓ Co-linked! Combined capacity: K ${fmtI(totalCap)} covers K ${fmtI(amount)}.</div>`;
          } else {
            msg += ` 2nd CF-OUT adds K ${fmtI(cf2Cap)}. Still short K ${fmtI(amount - totalCap)}.`;
          }
        } else {
          msg += ` Select a 2nd CF-OUT below to co-link.`;
        }
        if (msg.includes('warn-box')) msg += '</div>';
        warn.innerHTML = msg;
        warn.style.display = 'block';
      } else {
        link2Wrap.style.display = 'none';
        if (link2El) link2El.value = '';
        warn.innerHTML = `<div style="margin-top:10px;padding:8px 12px;background:#065f4630;border:1px solid var(--accent);border-radius:8px;font-size:10px;color:var(--accent);">✓ Fits within CF-OUT #1 total capacity.</div>`;
        warn.style.display = 'block';
      }
    }

    async function updateCF(id) {
      const db = getDB(); const r = db.cashflow.find(x => x.id === id); if (!r) return;

      const newType = document.getElementById('e-type').value;
      const newAmount = parseFloat(document.getElementById('e-amount').value) || 0;

      // Validation: Prevent negative balance on edit
      if (newType === 'out') {
        const a = analytics(db);
        // Calculate what the balance would be if we remove this transaction's old value
        let effectiveBalance = a.balance;
        if (r.type === 'out') effectiveBalance += (r.amountAED || 0);
        else effectiveBalance -= (r.amountAED || 0); // If they are changing an IN to an OUT

        if (newAmount > effectiveBalance) {
          alert(`Update Blocked: Modifying this expense to AED ${fmt(newAmount)} exceeds the available balance of AED ${fmt(effectiveBalance)}.`);
          return;
        }
      }

      r.type = newType; r.partner = document.getElementById('e-partner').value;
      r.amountAED = newAmount; r.transferDate = document.getElementById('e-tdate').value;
      r.exchangeDate = document.getElementById('e-edate').value; r.exchRate = parseFloat(document.getElementById('e-rate').value) || 0;
      r.zmwEquiv = parseFloat(document.getElementById('e-zmw').value) || 0; r.notes = document.getElementById('e-notes').value;
      if (r.exchRate > 0 && r.zmwEquiv === 0 && r.amountAED > 0) r.zmwEquiv = parseFloat((r.amountAED * r.exchRate).toFixed(2));
      await updateCashflowDB(id, r); await loadFromCloud(); toast('✓ Updated'); render()
    }

    async function updateExp(id) {
      const db = getDB(); const r = db.expenses.find(x => x.id === id); if (!r) return;
      r.date = document.getElementById('ee-date').value;
      r.amount = parseFloat(document.getElementById('ee-amount').value) || 0;
      r.paidTo = document.getElementById('ee-to').value;
      r.purpose = document.getElementById('ee-purpose').value;
      const catSel=document.getElementById('ee-cat').value;
      r.category=catSel==='__custom'?document.getElementById('ee-cat-custom').value:catSel;
      const linkVal = document.getElementById('ee-link').value;
      const link2El = document.getElementById('ee-link2');
      const link2Val = link2El ? link2El.value : '';
      const linkedCfId = linkVal ? parseInt(linkVal) : null;
      const linkedCfId2 = (link2Val && document.getElementById('ee-link2-wrap').style.display !== 'none') ? parseInt(link2Val) : null;
      let linkedCfIds = [];
      if (linkedCfId) linkedCfIds.push(linkedCfId);
      if (linkedCfId2 && linkedCfId2 !== linkedCfId) linkedCfIds.push(linkedCfId2);
      r.linkedCfId = linkedCfId;
      r.linkedCfIds = linkedCfIds.length ? linkedCfIds : null;
      await updateExpenseDB(id, r); await loadFromCloud(); toast('✓ Updated'); render()
    }

    function sectionCheck(key, label, icon) {
      return `<label style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface2);border-radius:8px;cursor:pointer;border:1px solid ${pdfSections[key] ? 'var(--accent)' : 'var(--border)'};">

    // ═══════════════════════════════════════════════════════════════════════
    // EXCEL GENERATION
    // ═══════════════════════════════════════════════════════════════════════
    function generateExcel(){
      const a=analytics(db,filters);
      const wb=XLSX.utils.book_new();

      // Sheet 1: Cash Flow IN
      if(pdfSections.cfIn){
        const inRows=a.filteredCF.filter(r=>r.type==='in').map((r,i)=>({
          'SN':r.sn||i+1,'Partner':r.partner||'','Amount (AED)':r.amountAED,'Transfer Date':r.transferDate||'','Notes':r.notes||''
        }));
        const ws1=XLSX.utils.json_to_sheet(inRows);
        XLSX.utils.book_append_sheet(wb,ws1,'CF-IN');
      }

      // Sheet 2: Cash Flow OUT
      if(pdfSections.cfOut){
        const outRows=a.filteredCF.filter(r=>r.type==='out').map((r,i)=>({
          'SN':r.sn||i+1,'Amount (AED)':r.amountAED,'Exchange Date':r.exchangeDate||'','Rate':r.exchRate||'','ZMW':r.zmwEquiv||'','Used':getLinkedTotal(db,r.id),'Notes':r.notes||''
        }));
        const ws2=XLSX.utils.json_to_sheet(outRows);
        XLSX.utils.book_append_sheet(wb,ws2,'CF-OUT');
      }

      // Sheet 3: Expenses
      if(pdfSections.expenses){
        const expRows=a.filteredExp.map((r,i)=>{
          const cfIds=r.linkedCfIds||(r.linkedCfId?[r.linkedCfId]:[]);
          const links=cfIds.map(id=>{const c=db.cashflow.find(x=>x.id===id);return c?'#'+c.sn:''}).filter(Boolean).join(', ');
          return{'#':i+1,'Date':r.date,'Amount (ZMW)':r.amount,'Paid To':r.paidTo,'Purpose':r.purpose,'Category':r.category||'','Linked CF':links||'Unlinked'};
        });
        const ws3=XLSX.utils.json_to_sheet(expRows);
        XLSX.utils.book_append_sheet(wb,ws3,'Expenses');
      }

      // Sheet 4: Summary
      if(pdfSections.summary){
        const sumData=[
          {'Metric':'Total Funded (AED)','Value':a.totalIn},
          {'Metric':'Total Spent (AED)','Value':a.totalOut},
          {'Metric':'Balance (AED)','Value':a.balance},
          {'Metric':'Total Expenses (ZMW)','Value':a.totalExp},
          {'Metric':'Avg Exchange Rate','Value':a.avgRate.toFixed(2)},
          {'Metric':'Linked Expenses','Value':a.linkedExp.length+'/'+a.expCount},
          {'Metric':'Utilization %','Value':(a.totalIn>0?((a.totalOut/a.totalIn)*100).toFixed(1):'0')+'%'},
        ];
        const ws4=XLSX.utils.json_to_sheet(sumData);
        XLSX.utils.book_append_sheet(wb,ws4,'Summary');
      }

      XLSX.writeFile(wb,'Farm_Report_'+new Date().toISOString().slice(0,10)+'.xlsx');
      toast('📊 Excel Downloaded!');
    }

      h+='<td style="padding:4px 5px;text-align:center;">'+(r.sn||i+1)+'</td>';
      h+='<td style="padding:4px 5px;text-align:right;font-weight:700;">'+fmt(r.amountAED)+'</td>';
      h+='<td style="padding:4px 5px;text-align:center;color:#666;">'+(r.exchangeDate||'-')+'</td>';
      h+='<td style="padding:4px 5px;text-align:center;color:#7c3aed;font-weight:600;">'+(r.exchRate||'-')+'</td>';
      h+='<td style="padding:4px 5px;text-align:right;font-weight:700;color:#d97706;">'+(r.zmwEquiv?fmtI(r.zmwEquiv):'-')+'</td>';
      h+='<td style="padding:4px 5px;text-align:right;font-weight:700;color:'+(used>(r.zmwEquiv||0)?'#dc2626':'#059669')+';">'+fmtI(used)+'</td>';
      // Add the remaining column (red if negative, otherwise standard gray)
      h+='<td style="padding:4px 5px;text-align:right;font-weight:700;color:'+(remaining<0?'#dc2626':'#6b7280')+';">'+fmtI(remaining)+'</td>';
      h+='<td style="padding:4px 5px;text-align:left;color:#555;">'+(r.notes||'-')+'</td></tr>';
    });

    // Totals for CF Out
    if(rows.length) {
      const totalOutAED = rows.reduce((s,r) => s + (r.amountAED || 0), 0);
      h+='<tr style="background:#e5e7eb;font-weight:800;border-top:2px solid #d1d5db;">';
      h+='<td style="padding:6px 5px;text-align:center;color:#374151;">TOT:</td>';
      h+='<td style="padding:6px 5px;text-align:right;color:#dc2626;font-size:10px;">'+fmt(totalOutAED)+'</td>';
      h+='<td colspan="2"></td>';
      h+='<td style="padding:6px 5px;text-align:right;color:#d97706;font-size:10px;">'+fmtI(totalZmwEquiv)+'</td>';
      h+='<td style="padding:6px 5px;text-align:right;color:#059669;font-size:10px;">'+fmtI(totalUsed)+'</td>';
      // Add the total remaining amount to the footer
      h+='<td style="padding:6px 5px;text-align:right;color:'+(totalRemaining<0?'#dc2626':'#374151')+';font-size:10px;">'+fmtI(totalRemaining)+'</td>';
      h+='<td></td></tr>';
    } else {
      h+='<tr><td colspan="8" style="padding:8px;text-align:center;color:#888;">No records</td></tr>';
    }
    h+='</tbody></table>';
  }

  if(pdfSections.expenses){
    h+='<div style="font-size:12px;font-weight:800;margin:14px 0 6px;border-bottom:2px solid #e5e7eb;padding-bottom:4px;">Expense Detail</div>';
    
    h+='<table style="width:100%;border-collapse:collapse;font-size:9px;"><thead><tr style="background:#131A22;color:#fff;">';
    h+='<th style="padding:5px;text-align:center;width:6%;">#</th>';
    h+='<th style="padding:5px;text-align:center;width:14%;">Date</th>';
    h+='<th style="padding:5px;text-align:right;width:20%;">Amount</th>';
    h+='<th style="padding:5px;text-align:left;width:15%;">Paid To</th>';
    h+='<th style="padding:5px;text-align:left;width:25%;">Purpose</th>';
    h+='<th style="padding:5px;text-align:center;width:20%;">Linked CF</th></tr></thead><tbody>';
    
    a.filteredExp.forEach((r,i)=>{
      const cfIds = r.linkedCfIds || (r.linkedCfId ? [r.linkedCfId] : []);
      const linkLabels = cfIds.map(id => {
        const c = db.cashflow.find(x => x.id === id);
        return c ? '#' + c.sn : '';
      }).filter(Boolean).join(', ');

      h+='<tr style="border-bottom:1px solid #f3f4f6;'+(i%2?'background:#fafafa;':'')+'">';
      h+='<td style="padding:4px 5px;text-align:center;">'+(i+1)+'</td>';
      h+='<td style="padding:4px 5px;text-align:center;">'+r.date+'</td>';
      h+='<td style="padding:4px 5px;text-align:right;font-weight:700;color:#059669;">K '+fmtI(r.amount)+'</td>';
      h+='<td style="padding:4px 5px;text-align:left;font-weight:600;">'+r.paidTo+'</td>';
      h+='<td style="padding:4px 5px;text-align:left;color:#555;">'+r.purpose+'</td>';
      h+='<td style="padding:4px 5px;text-align:center;color:#666;">'+(linkLabels ? linkLabels : '—')+'</td></tr>';
    });
    
    // Totals for Expenses
    if(a.filteredExp.length) {
      const totalExpAmount = a.filteredExp.reduce((s,r) => s + (r.amount || 0), 0);
      h+='<tr style="background:#e5e7eb;font-weight:800;border-top:2px solid #d1d5db;">';
      h+='<td colspan="2" style="padding:6px 5px;text-align:right;color:#374151;">TOTAL EXPENSES:</td>';
      h+='<td style="padding:6px 5px;text-align:right;color:#059669;font-size:10px;">K '+fmtI(totalExpAmount)+'</td>';
      h+='<td colspan="3"></td></tr>';
    } else {
      h+='<tr><td colspan="6" style="padding:8px;text-align:center;color:#888;">No records</td></tr>';
    }
    h+='</tbody></table>';
  }

  // NOTE: The HTML footer div has been completely removed here.
  h+='</div></div>';

  toast('⏳ Generating PDF...');

  setTimeout(() => {
    const opt = {
      margin: [10, 6, 15, 6], // Increased bottom margin to 15mm to make room for the pinned footer
      filename: 'Farm_Report_' + new Date().toISOString().slice(0, 10) + '.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['css', 'legacy'], avoid: ['tr'] }
    };

    html2pdf().set(opt).from(h).toPdf().get('pdf').then(function (pdf) {
      const totalPages = pdf.internal.getNumberOfPages();
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      
      for (let i = 1; i <= totalPages; i++) {
        pdf.setPage(i);
        
        // --- DRAW CUSTOM PINNED FOOTER ---
        const footerHeight = 10; 
        const footerY = pageHeight - footerHeight;

        // 1. Draw Background Rectangle (#131A22)
        pdf.setFillColor(19, 26, 34);
        pdf.rect(0, footerY, pageWidth, footerHeight, 'F');
        
        // 2. Draw Top Accent Line (#10b981)
        pdf.setDrawColor(16, 185, 129);
        pdf.setLineWidth(0.5);
        pdf.line(0, footerY, pageWidth, footerY);

        // 3. Add Left Text: "Crops Farming - Confidential"
        pdf.setFontSize(8);
        pdf.setTextColor(136, 136, 136); // #888
        pdf.text('Crops Farming - ', 10, footerY + 6);
        
        const textWidth = pdf.getTextWidth('Crops Farming - ');
        pdf.setTextColor(16, 185, 129); // #10b981
        pdf.text('Confidential', 10 + textWidth, footerY + 6);

        // 4. Add Right Text: Date & Pagination
        pdf.setTextColor(136, 136, 136); // #888
        const rightText = today + '   |   Page ' + i + ' of ' + totalPages;
        pdf.text(rightText, pageWidth - 10, footerY + 6, { align: 'right' });
      }
    }).save().then(() => {
      toast('📄 PDF Downloaded!');
    }).catch(e => {
      console.error(e);
      toast('PDF failed - check console');
    });
  }, 300);
}

      document.getElementById('app').innerHTML=`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:90vh;gap:20px;">
          <div style="position:relative;width:60px;height:60px;">
            <div style="width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#059669);display:flex;align-items:center;justify-content:center;font-size:28px;animation:pulse 1.5s ease-in-out infinite;">🌾</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;">Crops Farming Cashflow</div>
            <div style="font-size:11px;color:var(--muted);letter-spacing:0.5px;">Syncing with cloud database...</div>
          </div>
          <div style="width:180px;height:3px;background:var(--surface2);border-radius:4px;overflow:hidden;">
            <div style="width:40%;height:100%;background:linear-gradient(90deg,var(--accent),#3b82f6);border-radius:4px;animation:loadBar 1.2s ease-in-out infinite;"></div>
          </div>
        </div>
        <style>
          @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.85}}
          @keyframes loadBar{0%{width:10%;margin-left:0}50%{width:50%;margin-left:25%}100%{width:10%;margin-left:90%}}
        </style>`;
      await migrateToCloud();
      await loadFromCloud();
      db = getDB();
      render();
    })();
  </script>
